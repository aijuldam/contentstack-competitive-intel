# =============================================================================
# Contentstack Competitive Intelligence — Configuration
# =============================================================================
# Edit this file to update the target company, competitor list, monitored URLs,
# messaging inputs, and output settings. The pipeline reads this on every run.

# -- Our Company Context -------------------------------------------------------
our_company:
  name: "Contentstack"
  website: "https://www.contentstack.com"
  description: "Enterprise headless CMS and composable DXP founded in 2018 (spun out of Raw Engineering). HQ San Francisco. API-first, omnichannel content management for large enterprises. Pioneer of the composable DXP category."
  category: "Headless CMS / Composable DXP"
  icp: "Large enterprises managing content across multiple channels, brands, and regions — media, retail, financial services, healthcare, technology."
  strengths:
    - "Enterprise-grade headless CMS — built for scale from day one, not retrofitted"
    - "Composable DXP: 300+ Marketplace integrations, no lock-in"
    - "AI content operations: Pulse, Automate, AI Assistant, Personalize"
    - "Branch-based content workflows (dev parity with code)"
    - "99.99% uptime SLA with dedicated enterprise support"
    - "Named Leader in Forrester Wave for Agile CMS"
    - "Reference customers: IKEA, Walmart, Mattel, Shell, Mitsubishi, Sega"
  weaknesses:
    - "Less developer brand recognition than Contentful"
    - "Enterprise-only pricing limits SMB/startup accessibility"
    - "UI can have learning curve for non-technical editors"

# -- Monitoring Settings -------------------------------------------------------
monitoring:
  default_check_interval_hours: 24
  priority_check_interval_hours: 12
  staleness_threshold_days: 30
  max_concurrent_requests: 5
  request_delay_seconds: 2
  request_timeout_seconds: 30
  respect_robots_txt: true
  user_agent: "CompetitiveIntelBot/0.1 (internal research)"

# -- LLM Settings --------------------------------------------------------------
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.2

# -- Storage -------------------------------------------------------------------
storage:
  database_path: "data/competitive_intel.db"
  snapshots_dir: "data/snapshots"
  battlecards_dir: "data/battlecards"

# -- Output --------------------------------------------------------------------
output:
  json_dir: "data/battlecards/json"
  markdown_dir: "data/battlecards/markdown"
  digest_dir: "data/reports"

# -- Schedule (used by `python main.py schedule` and GitHub Actions cron) ------
schedule:
  full_refresh_cron: "0 2 * * *"       # Daily at 2 AM UTC
  priority_check_cron: "0 */12 * * *"  # Every 12 hours
  weekly_digest_cron: "0 8 * * 1"      # Monday 8 AM UTC
  staleness_check_cron: "0 7 * * *"    # Daily 7 AM UTC

